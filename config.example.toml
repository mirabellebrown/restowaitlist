# Din Tai Fung New York party-of-four example supplied by the user.
# The architecture is restaurant/provider agnostic: replace [location] values for another venue.
# IMPORTANT: an acknowledgment records your review; it does not create permission.

[location]
name = "Din Tai Fung New York"
address = ""
timezone = "America/New_York"
official_url = "https://www.yelp.com/biz/din-tai-fung-new-york-3?osq=Restaurants"
wait_source_url = "https://www.yelp.com/waitlist/din-tai-fung-new-york-3?party_size=4"
provider = "yelp-waitlist"

[source]
# The default path is a locally entered, complete snapshot. It never opens Yelp or any other
# third-party site. Use this unless you have a separately authorized data feed.
type = "manual"
permission_acknowledged = false
permission_reviewed_at = ""
# These options are retained for explicitly authorized generic sources only.
selector = "[data-wait-estimate], .wait-estimate, .wait-time"
attribute = ""
manual_csv_path = "./data/manual-waits.csv"
manual_snapshot_path = "./data/inbox/latest-waits.json"
timeout_seconds = 20.0
transient_retry_delay_seconds = 1.0
user_agent = "dtf-waitwatch/0.1 (permission-aware personal monitoring)"

[collection]
# One manual snapshot must include every configured party size. The local scheduled job stores
# exactly one 15-minute row for sizes 2 through 6, without fabricating values when no snapshot
# is available.
party_sizes = [2, 3, 4, 5, 6]
duration_days = 5.0
interval_minutes = 15

[recommendation]
default_risk_percentile = 0.80

[database]
path = "./data/waits.sqlite3"

# Optional. If omitted, collection is attempted at every interval. Add only verified hours.
# Multiple periods per day are supported, as are overnight ranges such as "17:00-01:00".
[opening_hours]
# monday = ["11:00-22:00"]
# tuesday = ["11:00-22:00"]
# wednesday = ["11:00-22:00"]
# thursday = ["11:00-22:00"]
# friday = ["11:00-23:00"]
# saturday = ["11:00-23:00"]
# sunday = ["11:00-22:00"]
