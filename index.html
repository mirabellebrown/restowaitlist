<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Din Tai Fung New York published wait estimates." />
    <title>Din Tai Fung wait table</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="app.js" defer></script>
  </head>
  <body>
    <main>
      <header>
        <p class="eyebrow">Wait estimates</p>
        <h1 id="restaurant-name">Din Tai Fung New York</h1>
        <p id="metadata" class="metadata">Loading published observations…</p>
      </header>

      <section aria-labelledby="wait-table-heading">
        <div class="section-heading">
          <h2 id="wait-table-heading">15-minute readings</h2>
          <p id="row-count"></p>
        </div>
        <div class="table-wrap">
          <table>
            <thead id="table-head"></thead>
            <tbody id="table-body"></tbody>
          </table>
        </div>
        <p id="empty-state" class="empty-state" hidden>No published observations yet.</p>
      </section>

      <p class="disclaimer">
        Estimates are manually supplied or come from a separately authorized source. They are not
        booking availability and may change before you arrive.
      </p>
    </main>
  </body>
</html>
